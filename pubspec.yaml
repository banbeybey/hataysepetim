name: hataysepetim
description: HataySepetim - Reyhanlı Alışveriş Uygulaması
publish_to: 'none'
version: 2.1.1+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.7.0
  flutter_local_notifications: ^17.2.3
  workmanager: ^0.9.0
  video_player: ^2.8.3
  flutter_secure_storage: ^9.2.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # HTTP istekleri
  http: ^1.2.0

  # Yerel depolama (token, kullanıcı bilgisi)
  shared_preferences: ^2.2.2

  # Resim gösterimi (cache)
  cached_network_image: ^3.3.1

  # Icon paketi
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # URL açma
  url_launcher: ^6.2.5

  # Animasyonlar
  flutter_animate: ^4.5.0

  # Separator / divider
  flutter_staggered_grid_view: ^0.7.0
  image_picker: ^1.2.1
  file_picker: ^10.3.10

  # PDF görüntüleme
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/

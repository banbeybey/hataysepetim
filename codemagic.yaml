workflows:
  ios-app-store:
    name: HataySepetim iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hataysepetim.app  # ← Xcode'da ne yazdıysan o
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable      # pubspec sdk: >=3.0.0 → stable branch yeterli
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Flutter version
        script: flutter --version

      - name: Get Flutter packages
        script: flutter pub get

      - name: Firebase GoogleService-Info.plist kontrolü
        script: |
          # Firebase kullandığın için bu dosya zorunlu!
          # Codemagic > App Settings > Environment files bölümüne ekle
          ls ios/Runner/GoogleService-Info.plist || {
            echo "❌ GoogleService-Info.plist bulunamadı!"
            exit 1
          }

      - name: Pod install
        script: |
          cd ios
          pod install --repo-update

      - name: Flutter build iOS (release, no-codesign)
        script: |
          flutter build ios \
            --release \
            --no-codesign \
            --build-name=2.1.1 \
            --build-number=$BUILD_NUMBER

      - name: Xcode archive & IPA export
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: true
        release_type: MANUAL
      email:
        recipients:
          - sen@email.com   # ← kendi e-postanı yaz
        notify:
          success: true
          failure: true
